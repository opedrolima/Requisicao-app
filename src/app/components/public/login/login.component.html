<div class="login-wrapper">
  <div class="card login-card">
    <div class="card-body">

      <div class="text-center mb-4">
        <i class="fas fa-tasks fa-2x text-primary"></i>
        <h4 class="mt-3">Sistema de Requisições</h4>
      </div>

      <form #f="ngForm" novalidate>
        <div class="form-group mb-3">
          <label>Email</label>
          <input class="form-control" name="email" [(ngModel)]="email" placeholder="Informe seu email" required>
        </div>

        <div class="form-group mb-4">
          <label>Senha</label>
          <input class="form-control" type="password" name="senha" [(ngModel)]="senha" placeholder="Informe sua senha" required>
        </div>

        <div class="d-grid gap-2 mb-3">
          <button type="button" class="btn btn-primary" (click)="logar()">
            <i class="fas fa-sign-in-alt me-1"></i> Entrar
          </button>

          <button type="button" class="btn btn-outline-success" (click)="enviaLink()">
            <i class="far fa-envelope me-1"></i> Recuperar senha
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
